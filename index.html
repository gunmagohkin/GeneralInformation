<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENERAL INFORMATION BOARD</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: row;
            background-color: #000; /* Dark background for a cleaner look during transitions */
        }
        
        #galleryFrame {
            width: 70%;
            height: 100%;
            border: none;
            box-sizing: border-box;
            background-color: #fff;
        }
        
        .right-column {
            width: 30%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        #sliderFrame {
            width: 100%;
            height: 63%;
            border: none;
            box-sizing: border-box;
            background-color: #fff;
        }
        
        #birthdayFrame {
            width: 100%;
            height: 37%;
            border: none;
            box-sizing: border-box;
            background-color: #fff;
        }

        #refreshTimer {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }

        @media (max-width: 900px) {
            body, html {
                flex-direction: column;
                overflow-y: auto;
                height: auto;
            }
            #galleryFrame {
                width: 100%;
                height: 60vh;
                min-height: 400px;
            }
            .right-column {
                width: 100%;
                height: auto;
            }
            #sliderFrame, #birthdayFrame {
                width: 100%;
                height: 25vh;
                min-height: 250px;
            }
        }
    </style>
</head>
<body>

    <div id="refreshTimer">Page Refresh in: <span id="countdown">60:00</span></div>
    
    <iframe id="galleryFrame" src="https://script.google.com/macros/s/AKfycbw6EturHQPBHhfoEUqvB3FH_nQYktVelbvmWZPRT3LgVluTnn_bDhyC8EKpMcttJE4Z/exec" title="General Information Board"></iframe>
    
    <div class="right-column">
        <iframe id="sliderFrame" src="https://script.google.com/macros/s/AKfycbyzsx_M1me5fbSRN16Cy1f8TcBRONopi2Mx-J5AJdqgXR_4LuVEdcg9WGM8FvSXdHBD/exec" title="PDF Slider"></iframe>
        <iframe id="birthdayFrame" src="https://script.google.com/macros/s/AKfycbysL_sr8ZTnQJEIWfOlw_WvpmGhxoHgTOzsJxSpRvWZtfE-Ps3Eec0aj5Li9sZwJk6x/exec" title="Today's Birthday"></iframe>
    </div>

    <script>
        // --- CONFIGURATION ---
        const REFRESH_INTERVAL = 60 * 60 * 1000; // 1 Hour (Full Page)
        const GALLERY_SWITCH_TIME = 60 * 1000;   // 1 Minute (URL Swap)
        const SIDEBAR_REFRESH_TIME = 30 * 60 * 1000; // 30 Minutes
        
        // Gallery URLs
        const URL_A = "https://script.google.com/macros/s/AKfycbw6EturHQPBHhfoEUqvB3FH_nQYktVelbvmWZPRT3LgVluTnn_bDhyC8EKpMcttJE4Z/exec";
        const URL_B = "https://script.google.com/macros/s/AKfycbxVHk5HkKEL4RyS_evAftH8WFPaG0gnEeuqZcjjlvjBDu1xEVjktBnBbT9chWEk8tEm/exec";
        
        let currentUrlIndex = 0; // 0 for URL_A, 1 for URL_B

        // --- 1. FULL PAGE AUTO-REFRESH ---
        setTimeout(() => {
            location.reload();
        }, REFRESH_INTERVAL);

        // --- 2. COUNTDOWN TIMER LOGIC ---
        let timeLeft = REFRESH_INTERVAL / 1000;
        const countdownElement = document.getElementById('countdown');
        
        function updateCountdown() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            countdownElement.textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft > 0) {
                timeLeft--;
                setTimeout(updateCountdown, 1000);
            }
        }
        updateCountdown();

        // --- 3. GALLERY SWITCHING LOGIC (Every 1 Minute) ---
        setInterval(() => {
            const gallery = document.getElementById('galleryFrame');
            if (currentUrlIndex === 0) {
                gallery.src = URL_B;
                currentUrlIndex = 1;
            } else {
                gallery.src = URL_A;
                currentUrlIndex = 0;
            }
            console.log("Gallery switched at: " + new Date().toLocaleTimeString());
        }, GALLERY_SWITCH_TIME);

        // --- 4. SIDEBAR REFRESH (Every 30 Minutes) ---
        setInterval(() => {
            const slider = document.getElementById('sliderFrame');
            const birthday = document.getElementById('birthdayFrame');
            
            // Appending a dummy query to force reload without cache issues
            slider.src = slider.src.split('?')[0] + '?t=' + new Date().getTime();
            birthday.src = birthday.src.split('?')[0] + '?t=' + new Date().getTime();
        }, SIDEBAR_REFRESH_TIME);

    </script>
</body>
</html>
